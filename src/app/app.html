<div class="container">
  <h1>Color Picker App</h1>
  <input type="color" [value]="selectedColor()" (input)="onColorChange($event.target.value)" />
  <div class="preview-box" [style.backgroundColor]="selectedColor()">Preview</div>
  <p class="hex-code">
    Hex Code: <b>{{ selectedColor() }}</b>
  </p>
  <button (click)="copyColor()">Copy Color</button>
</div>
